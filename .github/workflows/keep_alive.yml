name: Keep Alive

on:
  schedule:
    # Se ejecuta cada 14 minutos (Render se duerme a los 15 min de inactividad)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Para probarlo manualmente

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          curl -s "${{ secrets.RENDER_APP_URL }}/health" > /dev/null
          echo "Ping enviado a las $(date)"
